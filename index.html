<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iso-td</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #080c18; overflow: hidden; height: 100%; touch-action: none; font-family: 'Rajdhani', monospace; }
canvas { display: block; touch-action: none; position: absolute; top: 0; left: 0; }

/* ── Top bar ─────────────────────────────────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(180deg, rgba(6,10,22,0.97) 0%, rgba(4,7,16,0.92) 100%);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(80,140,255,0.15);
  box-shadow: 0 2px 28px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; z-index: 40; user-select: none;
}
#tb-title {
  font-size: 21px; font-weight: 700; letter-spacing: 0.24em;
  color: #5ab4f0; text-shadow: 0 0 18px rgba(90,180,240,0.4);
  pointer-events: none; margin-right: 6px;
}
#tb-left  { display: flex; align-items: center; gap: 6px; pointer-events: none; }
#tb-right { display: flex; align-items: center; gap: 6px; pointer-events: auto; }

.tb-chip {
  display: flex; align-items: center; gap: 9px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; padding: 6px 14px;
  pointer-events: none;
}
.tb-chip-icon { font-size: 17px; line-height: 1; }
.tb-chip-body { display: flex; flex-direction: column; line-height: 1.1; }
.tb-chip-lbl  { font-size: 8px; letter-spacing: 0.18em; color: #3a4e62; font-weight: 600; text-transform: uppercase; }
.tb-chip-val  { font-size: 20px; font-weight: 700; color: #c8d8ec; line-height: 1; }
.tb-chip-val.gold  { color: #ffd060; text-shadow: 0 0 10px rgba(255,208,96,0.3); }
.tb-chip-val.lives { color: #ff7878; text-shadow: 0 0 10px rgba(255,100,100,0.3); }
.tb-chip-val.wave  { color: #78c8ff; }
.tb-div { width: 1px; height: 28px; background: rgba(255,255,255,0.07); margin: 0 2px; flex-shrink: 0; }

#prep-badge {
  display: none; align-items: center; gap: 8px;
  background: rgba(40,200,100,0.08); border: 1px solid rgba(40,200,100,0.25);
  border-radius: 10px; padding: 6px 14px;
}
#prep-lbl { color: #3dc878; font-size: 8px; letter-spacing: 0.18em; font-weight: 600; }
#hud-prep { color: #3dc878; font-size: 20px; font-weight: 700; line-height: 1; }

#prep-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.04); }
#prep-bar { height: 100%; background: linear-gradient(90deg,#2a8,#7fd); width: 100%; transition: width 0.1s linear; }

#wave-sub { color: #3a4a5a; font-size: 11px; letter-spacing: 0.04em; font-weight: 600; max-width: 180px; }

/* ── Speed & control buttons ─────────────────────────────────────────────── */
#speed-btns { display: flex; gap: 3px; }
.spd-btn {
  background: rgba(8,14,28,0.85); border: 1px solid rgba(60,100,160,0.25);
  color: #4a7898; font-family: 'Rajdhani', monospace; font-size: 13px; font-weight: 700;
  padding: 5px 10px; border-radius: 7px; cursor: pointer; letter-spacing: 0.05em;
  transition: all 0.12s;
}
.spd-btn:hover  { background: rgba(18,38,72,0.9); border-color: rgba(80,160,220,0.5); color: #7ab8d8; }
.spd-btn.active { background: rgba(16,44,80,0.95); border-color: #3a80b0; color: #9ad4f0; }

#in-game-restart {
  background: rgba(8,14,28,0.85); border: 1px solid rgba(60,100,160,0.25);
  color: #4a7898; font-size: 18px; font-family: monospace;
  width: 34px; height: 34px; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; flex-shrink: 0;
}
#in-game-restart:hover { background: rgba(24,50,90,0.9); border-color: rgba(80,160,220,0.5); color: #9ad4f0; }

@keyframes btn-pulse {
  0%,100% { box-shadow: 0 0 0 rgba(58,128,176,0); }
  50%      { box-shadow: 0 0 16px rgba(58,128,176,0.45); }
}
#wave-btn {
  background: linear-gradient(135deg,#0c2840,#091c30);
  border: 1.5px solid #2a6090; color: #7ec8ff;
  font-family: 'Rajdhani', monospace; font-size: 14px; font-weight: 700;
  padding: 7px 22px; border-radius: 8px; cursor: pointer;
  letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s;
}
#wave-btn:not(:disabled) { animation: btn-pulse 2.2s ease-in-out infinite; }
#wave-btn:not(:disabled):hover { background: linear-gradient(135deg,#163a5c,#0e2a48); border-color: #4a9ad0; color: #aadcff; }
#wave-btn:disabled { opacity: 0.28; cursor: not-allowed; animation: none; }

/* ── Tower panel ─────────────────────────────────────────────────────────── */
#tower-panel {
  position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
  background: linear-gradient(180deg, rgba(4,7,16,0.90) 0%, rgba(6,10,22,0.97) 100%);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(80,140,255,0.12);
  box-shadow: 0 -2px 24px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: flex-start; gap: 8px;
  padding: 0 16px; z-index: 40; pointer-events: auto;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#tower-panel::-webkit-scrollbar { display: none; }
.tc-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 8px 10px; cursor: pointer;
  width: 84px; min-width: 84px; flex-shrink: 0; position: relative; font-family: 'Rajdhani', monospace;
  transition: border-color 0.14s, background 0.14s, opacity 0.14s;
}
.tc-card:hover:not(.tc-disabled) { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.20); }
.tc-card.tc-disabled { opacity: 0.28; cursor: not-allowed; }
.tc-icon  { width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0; overflow: hidden; }
.tc-name  { color: #b8c8dc; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
.tc-cost  { color: #ffd060; font-size: 10px; font-weight: 600; }
.tc-key   { position: absolute; top: 4px; right: 6px; color: rgba(255,255,255,0.18); font-size: 9px; }

/* ── Tower info panel ────────────────────────────────────────────────────── */
#info-panel {
  position: absolute; right: 12px; top: 70px;
  background: rgba(5,9,18,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 41; min-width: 200px;
  pointer-events: none; opacity: 0; transition: opacity 0.18s ease;
}
#info-panel.show { pointer-events: auto; opacity: 1; }
.ip-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.ip-title  { display: flex; flex-direction: column; gap: 4px; }
#ip-name   { color: #dde; font-size: 14px; font-weight: 700; font-family: 'Rajdhani', monospace; letter-spacing: 0.06em; }
#ip-tier   { font-size: 9px; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.05em; display: inline-block; }
#ip-tier.t0 { background:#1a2030; color:#556; }
#ip-tier.t1 { background:#3a2800; color:#ffaa00; }
#ip-tier.t2 { background:#2a1040; color:#aa44ff; }
#ip-close  { background:none; border:none; color:#445; font-size:16px; cursor:pointer; padding:0; line-height:1; transition:color 0.12s; flex-shrink:0; }
#ip-close:hover { color: #aab; }
.ip-divider { height:1px; background:rgba(255,255,255,0.07); }
#ip-stats   { color:#667; font-size:10px; font-family:monospace; line-height:1.75; }
#ip-next    { color:#3a6; font-size:9px; font-family:monospace; line-height:1.55; }
#ip-upgrade {
  background:#0d1f18; border:1px solid #1a4030; color:#5dddaa;
  font-family:'Rajdhani',monospace; font-size:11px; font-weight:600;
  padding:7px 10px; border-radius:5px; cursor:pointer; text-align:left; transition:background 0.1s;
}
#ip-upgrade:hover:not(:disabled) { background:#122a20; }
#ip-upgrade:disabled { opacity:0.3; cursor:not-allowed; }
#ip-sell {
  background:#1a0d0d; border:1px solid #3a1818; color:#ff7070;
  font-family:'Rajdhani',monospace; font-size:11px; font-weight:600;
  padding:7px 10px; border-radius:5px; cursor:pointer; transition:background 0.1s;
}
#ip-sell:hover { background:#2a1010; }

/* ── Wave announce ───────────────────────────────────────────────────────── */
@keyframes wa-fade {
  0%    { opacity:0; transform:translate(-50%,-50%) scale(0.90); }
  15%   { opacity:1; transform:translate(-50%,-50%) scale(1.00); }
  75%   { opacity:1; transform:translate(-50%,-50%) scale(1.00); }
  100%  { opacity:0; transform:translate(-50%,-50%) scale(1.05); }
}
#wave-announce {
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  pointer-events:none; z-index:50; opacity:0;
}
#wave-announce.show { animation: wa-fade 1.8s forwards; }
#wa-wave {
  font-family:'Rajdhani',monospace; font-size:72px; font-weight:700;
  letter-spacing:0.18em; color:#fff; line-height:1;
  text-shadow: 0 0 30px rgba(255,180,0,0.7), 0 0 80px rgba(255,140,0,0.3);
}
#wa-comp { font-family:'Rajdhani',monospace; font-size:14px; letter-spacing:0.12em; color:#ffcc88; opacity:0.85; }

/* ── Handle bar (hidden on desktop) ─────────────────────────────────────── */
.ip-handle { display: none; }

/* ── Mobile responsive ───────────────────────────────────────────────────── */
@media (max-width: 600px) {
  #topbar { height: 50px; padding: 0 10px; }
  #tb-title { font-size: 16px; margin-right: 4px; }
  .tb-chip { padding: 4px 8px; gap: 6px; }
  .tb-chip-val { font-size: 15px; }
  .tb-chip-lbl { font-size: 7px; }
  .tb-chip-icon { font-size: 13px; }
  .tb-div { margin: 0; }
  /* Wave chip hidden — number shown in floating wave button */
  #tb-chip-wave { display: none; }
  /* Prep badge hidden — countdown shown in floating wave button text */
  #prep-badge { display: none !important; }
  #wave-sub { display: none; }
  .spd-btn { font-size: 11px; padding: 4px 7px; }
  #in-game-restart { width: 30px; height: 30px; }
  /* Float the wave button above the tower panel for easy thumb access */
  #wave-btn {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 45;
    white-space: nowrap;
    font-size: 14px;
    padding: 10px 26px;
    border-radius: 10px;
  }
  #tower-panel { height: 80px; }
  .tc-card { width: 72px; min-width: 72px; padding: 6px 8px; }
  .tc-icon { width: 32px; height: 32px; }
  .tc-name { font-size: 9px; }
  .tc-cost { font-size: 9px; }
  #info { bottom: 88px; }

  /* Bottom sheet */
  #info-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    top: auto; min-width: unset;
    border-radius: 16px 16px 0 0;
    border: 1px solid rgba(80,140,255,0.15);
    padding: 8px 20px 20px;
    transform: translateY(100%);
    opacity: 1;
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }
  #info-panel.show {
    transform: translateY(0);
    pointer-events: auto;
  }
  .ip-handle {
    display: block;
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    margin: 0 auto 10px;
  }
  #ip-upgrade, #ip-sell { padding: 11px 14px; font-size: 13px; }
}

/* ── Debug info ──────────────────────────────────────────────────────────── */
#info { position:absolute; bottom:100px; left:12px; color:#2a3a4a; font-size:10px; background:rgba(0,0,0,0.3); padding:3px 8px; border-radius:4px; pointer-events:none; font-family:monospace; }

/* ── End screen ──────────────────────────────────────────────────────────── */
#end-screen {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.80); z-index:100; pointer-events:none;
  opacity:0; transition:opacity 0.4s ease;
}
#end-screen.show { opacity:1; }
#end-panel {
  background:linear-gradient(160deg,rgba(8,13,26,0.99),rgba(5,7,15,0.99));
  border:1px solid rgba(80,140,255,0.12);
  border-radius:18px; padding:48px 64px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  box-shadow:0 0 120px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04);
  min-width:360px; pointer-events:auto;
}
#end-title { font-size:56px; font-weight:700; letter-spacing:0.1em; line-height:1; font-family:'Rajdhani',monospace; }
#end-title.victory  { color:#ffd060; text-shadow:0 0 50px rgba(255,200,60,0.5); }
#end-title.gameover { color:#e04040; text-shadow:0 0 50px rgba(220,60,60,0.45); }
#end-divider { width:100%; height:1px; background:rgba(255,255,255,0.07); margin:4px 0; }
#end-msg   { color:#889; font-size:14px; letter-spacing:0.04em; font-family:'Rajdhani',monospace; }
#end-stats { color:#aab; font-size:12px; line-height:2; text-align:center; font-family:'Rajdhani',monospace; }
#end-best  { color:#445; font-size:10px; letter-spacing:0.06em; }
#end-speed-row { display:flex; align-items:center; gap:6px; margin-top:4px; }
#end-speed-label { color:#445; font-size:9px; letter-spacing:0.12em; margin-right:2px; }
#end-restart {
  background:linear-gradient(135deg,#0c2840,#091c30); border:1.5px solid #2a6090; color:#7ec8ff;
  font-family:'Rajdhani',monospace; font-size:15px; font-weight:700;
  padding:10px 32px; border-radius:8px; cursor:pointer; margin-top:4px;
  letter-spacing:0.08em; text-transform:uppercase; transition:all 0.15s;
}
#end-restart:hover { background:linear-gradient(135deg,#163a5c,#0e2a48); border-color:#4a9ad0; }

/* ── Loading screen ──────────────────────────────────────────────────────── */
#loading-screen {
  position:absolute; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:#080c18; transition:opacity 0.4s ease;
}
#loading-screen.hidden { opacity:0; pointer-events:none; }
#loading-panel { display:flex; flex-direction:column; align-items:center; gap:14px; font-family:'Rajdhani',monospace; }
#loading-title { font-size:56px; font-weight:700; letter-spacing:0.28em; color:#c8d8ec; text-shadow:0 0 40px rgba(90,180,240,0.35); }
#loading-sub { color:#3a4a5a; font-size:12px; letter-spacing:0.18em; font-weight:600; }
#loading-track { width:280px; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
#loading-bar { height:100%; width:0%; background:linear-gradient(90deg,#2a6090,#5ab4f0); border-radius:2px; transition:width 0.2s ease; }
#loading-status { color:#2a3a4a; font-size:10px; letter-spacing:0.1em; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div id="loading-panel">
      <div id="loading-title">ISO-TD</div>
      <div id="loading-sub">Loading assets…</div>
      <div id="loading-track"><div id="loading-bar"></div></div>
      <div id="loading-status">0 / 14</div>
    </div>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div id="tb-left">
      <span id="tb-title">ISO·TD</span>
      <div class="tb-div"></div>
      <div class="tb-chip">
        <span class="tb-chip-icon" style="color:#ff7878">♥</span>
        <div class="tb-chip-body">
          <span class="tb-chip-lbl">Lives</span>
          <span id="hud-lives" class="tb-chip-val lives">20</span>
        </div>
      </div>
      <div class="tb-chip">
        <span class="tb-chip-icon" style="color:#ffd060">◈</span>
        <div class="tb-chip-body">
          <span class="tb-chip-lbl">Gold</span>
          <span id="hud-gold" class="tb-chip-val gold">1000</span>
        </div>
      </div>
      <div class="tb-chip" id="tb-chip-wave">
        <span class="tb-chip-icon" style="color:#78c8ff">◎</span>
        <div class="tb-chip-body">
          <span class="tb-chip-lbl">Wave</span>
          <span id="hud-wave" class="tb-chip-val wave">— / 10</span>
        </div>
      </div>
      <div id="prep-badge">
        <span id="prep-lbl">PREP</span>
        <span id="hud-prep">8s</span>
      </div>
    </div>
    <div id="tb-right">
      <span id="wave-sub"></span>
      <div id="speed-btns">
        <button class="spd-btn active" data-speed="1">×1</button>
        <button class="spd-btn" data-speed="2">×2</button>
        <button class="spd-btn" data-speed="3">×3</button>
      </div>
      <button id="in-game-restart" title="Restart game">↺</button>
      <button id="wave-btn">Start Wave 1</button>
    </div>
    <div id="prep-bar-wrap"><div id="prep-bar"></div></div>
  </div>

  <!-- Tower panel (always-visible bottom bar) -->
  <div id="tower-panel"></div>

  <!-- Tower info panel (right side on desktop, bottom sheet on mobile) -->
  <div id="info-panel">
    <div class="ip-handle"></div>
    <div class="ip-header">
      <div class="ip-title">
        <div id="ip-name">Tower</div>
        <span id="ip-tier" class="t0">BASE</span>
      </div>
      <button id="ip-close">✕</button>
    </div>
    <div class="ip-divider"></div>
    <div id="ip-stats"></div>
    <div id="ip-next"></div>
    <button id="ip-upgrade">Upgrade</button>
    <button id="ip-sell">Sell</button>
  </div>

  <!-- Wave announce overlay -->
  <div id="wave-announce">
    <div id="wa-wave">WAVE 1</div>
    <div id="wa-comp"></div>
  </div>

  <!-- Debug info -->
  <div id="info">—</div>

  <!-- End screen (Game Over / Victory) -->
  <div id="end-screen">
    <div id="end-panel">
      <div id="end-title"></div>
      <div id="end-divider"></div>
      <div id="end-msg"></div>
      <div id="end-stats"></div>
      <div id="end-best"></div>
      <div id="end-speed-row">
        <span id="end-speed-label">SPEED</span>
        <button class="spd-btn active" data-speed="1">×1</button>
        <button class="spd-btn"        data-speed="2">×2</button>
        <button class="spd-btn"        data-speed="3">×3</button>
      </div>
      <button id="end-restart">Play Again</button>
    </div>
  </div>

  <!-- Global error trap: surfaces JS errors on the loading screen so we
       never get a silent hang if a module import or early script fails. -->
  <script>
    function _showLoadErr(msg) {
      var sub = document.getElementById('loading-sub');
      var sta = document.getElementById('loading-status');
      if(sub) sub.textContent = 'Error — see console';
      if(sta) sta.textContent = String(msg).slice(0,120);
    }
    window.addEventListener('error', function(e){ _showLoadErr(e.message || e); });
    window.addEventListener('unhandledrejection', function(e){ _showLoadErr(e.reason?.message || e.reason || e); });
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
      "three/addons/loaders/GLTFLoader.js": "https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js"
    }
  }
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
